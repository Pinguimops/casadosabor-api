<svg width="680" height="260" viewBox="0 0 680 260" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Casa do Sabor</title>
<defs>
  <style>
    .gold      { fill: #C9A84C; }
    .gold-lt   { fill: #E2C06A; }
    .gold-dk   { fill: #8B6914; }
    .dark      { fill: #1A1208; }
  </style>
</defs>

<!-- Outer frame -->
<rect x="40" y="20" width="600" height="220" fill="none" stroke="#C9A84C" stroke-width="1"/>
<rect x="46" y="26" width="588" height="208" fill="none" stroke="#C9A84C" stroke-width="0.4" stroke-dasharray="4 4"/>

<!-- Corner diamonds -->
<polygon points="40,20 48,28 40,36 32,28" class="gold"/>
<polygon points="640,20 648,28 640,36 632,28" class="gold"/>
<polygon points="40,240 48,232 40,224 32,232" class="gold"/>
<polygon points="640,240 648,232 640,224 632,232" class="gold"/>

<!-- Fork (left) -->
<rect x="218" y="98" width="6" height="76" rx="3" class="gold"/>
<rect x="214" y="58" width="3" height="30" rx="1.5" class="gold"/>
<rect x="219" y="55" width="3" height="33" rx="1.5" class="gold"/>
<rect x="224" y="58" width="3" height="30" rx="1.5" class="gold"/>
<rect x="212" y="88" width="17" height="5" rx="2" class="gold"/>

<!-- Cloche shadow/plate -->
<ellipse cx="340" cy="172" rx="68" ry="8" fill="#8B6914" opacity="0.35"/>
<ellipse cx="340" cy="166" rx="66" ry="7" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
<ellipse cx="340" cy="166" rx="58" ry="5" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
<!-- Dome -->
<path d="M276,166 Q278,118 340,108 Q402,118 404,166 Z" fill="#1A1208" stroke="#C9A84C" stroke-width="2"/>
<path d="M294,155 Q300,126 330,118" fill="none" stroke="#E2C06A" stroke-width="1.2" opacity="0.5"/>
<!-- Knob -->
<circle cx="340" cy="108" r="7" class="gold"/>
<circle cx="340" cy="108" r="3.5" class="gold-lt"/>

<!-- Knife (right) -->
<rect x="456" y="98" width="6" height="76" rx="3" class="gold"/>
<path d="M459,58 L462,88 L456,88 Z" class="gold"/>
<line x1="459" y1="62" x2="459" y2="86" stroke="#E2C06A" stroke-width="0.8"/>
<rect x="454" y="88" width="13" height="5" rx="2" class="gold"/>

<!-- Horizontal rules -->
<line x1="74"  y1="137" x2="204" y2="137" stroke="#C9A84C" stroke-width="0.8"/>
<line x1="476" y1="137" x2="606" y2="137" stroke="#C9A84C" stroke-width="0.8"/>
<polygon points="194,137 199,132 204,137 199,142" class="gold"/>
<polygon points="476,137 481,132 486,137 481,142" class="gold"/>

<!-- Subtitle above -->
<text x="340" y="55" text-anchor="middle"
      font-family="Georgia, serif" font-size="13" letter-spacing="6"
      fill="#C9A84C">RESTAURANTE</text>

<!-- Main name -->
<text x="340" y="210" text-anchor="middle"
      font-family="Georgia, serif" font-size="38" letter-spacing="3"
      font-style="italic" fill="#E2C06A">Casa do Sabor</text>

<!-- Rule under name -->
<line x1="200" y1="218" x2="480" y2="218" stroke="#C9A84C" stroke-width="0.6"/>

<!-- Tagline -->
<text x="340" y="234" text-anchor="middle"
      font-family="Arial, sans-serif" font-size="10" letter-spacing="4"
      fill="#8B6914">LISBOA · DESDE 2005</text>
</svg>
